<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>恋爱脑人格测试 💘</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --pink: #ff6b9d; --pink-light: #ffd6e8; --pink-dark: #e0457a;
  --purple: #c77dff; --purple-light: #e8d5ff;
  --bg: #fff5f9; --text: #3d1f2f; --text-light: #8c6478;
  --card: #ffffff; --shadow: 0 8px 32px rgba(255,107,157,0.15);
}
body {
  font-family: -apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  background: var(--bg); min-height: 100vh;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 24px 16px;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(255,107,157,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(199,125,255,0.08) 0%, transparent 50%);
}
.container { width: 100%; max-width: 520px; }

/* COVER */
#cover {
  background: var(--card); border-radius: 28px;
  padding: 48px 32px 40px; box-shadow: var(--shadow);
  text-align: center; animation: fadeInUp 0.6s ease;
}
.cover-emoji { font-size: 76px; display: block; margin-bottom: 18px; animation: pulse 2.2s infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
.cover-title { font-size: 28px; font-weight: 900; color: var(--pink); margin-bottom: 6px; letter-spacing: 2px; }
.cover-sub { font-size: 14px; color: var(--text-light); margin-bottom: 24px; line-height: 1.7; }
.cover-tags { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
.tag { background: var(--pink-light); color: var(--pink-dark); font-size: 12px; padding: 5px 14px; border-radius: 20px; font-weight: 600; }
.cover-dims {
  background: linear-gradient(135deg,#fff5f9,#f8f0ff);
  border-radius: 16px; padding: 16px 20px; margin-bottom: 28px;
  border: 1px solid var(--pink-light); text-align: left;
}
.cover-dims-title { font-size: 12px; font-weight: 800; color: var(--text-light); margin-bottom: 10px; letter-spacing: 1px; }
.dim-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 13px; color: var(--text); }
.dim-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.start-btn {
  width: 100%; padding: 17px;
  background: linear-gradient(135deg,var(--pink),var(--purple));
  color: white; font-size: 17px; font-weight: 700; border: none;
  border-radius: 16px; cursor: pointer; letter-spacing: 2px;
  box-shadow: 0 6px 20px rgba(255,107,157,0.4); transition: all 0.2s;
}
.start-btn:active { transform: scale(0.97); }
.cover-note { margin-top: 14px; font-size: 12px; color: #bba0b0; }

/* QUIZ */
#quiz { display: none; }
.quiz-header { margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
.q-counter { font-size: 13px; color: var(--text-light); font-weight: 600; white-space: nowrap; }
.q-counter strong { color: var(--pink); font-size: 15px; }
.progress-bar-bg { height: 8px; background: var(--pink-light); border-radius: 99px; flex: 1; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg,var(--pink),var(--purple)); border-radius: 99px; transition: width 0.4s ease; width: 0%; }
.dim-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 99px; white-space: nowrap; }

.question-card {
  background: var(--card); border-radius: 24px;
  padding: 28px 24px 24px; box-shadow: var(--shadow);
  min-height: 340px; display: flex; flex-direction: column;
}
.q-num-badge {
  display: inline-block;
  background: linear-gradient(135deg,var(--pink),var(--purple));
  color: white; font-size: 11px; font-weight: 700;
  padding: 3px 12px; border-radius: 99px; margin-bottom: 14px; letter-spacing: 1px;
}
.q-emoji { font-size: 32px; margin-bottom: 10px; }
.q-text { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.65; margin-bottom: 22px; flex: 1; }
.options { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  width: 100%; padding: 13px 16px;
  background: #fef0f6; border: 2px solid transparent;
  border-radius: 13px; font-size: 13px; font-weight: 500;
  color: var(--text); cursor: pointer; text-align: left;
  transition: all 0.2s; line-height: 1.5;
}
.option-btn:hover { border-color: var(--pink); transform: translateX(3px); }
.option-btn.selected {
  background: linear-gradient(135deg,var(--pink),var(--purple));
  color: white; border-color: transparent; transform: translateX(3px);
}
.option-inner { display: flex; align-items: flex-start; gap: 10px; }
.option-label {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; min-width: 20px;
  background: white; border-radius: 50%;
  font-size: 10px; font-weight: 800; color: var(--pink);
}
.option-btn.selected .option-label { background: rgba(255,255,255,0.3); color: white; }

.nav-row { display: flex; gap: 10px; margin-top: 16px; }
.prev-btn {
  padding: 12px 20px; background: white;
  border: 2px solid var(--pink-light); border-radius: 12px;
  font-size: 13px; color: var(--text-light); cursor: pointer; font-weight: 600; transition: all 0.2s;
}
.prev-btn:hover { border-color: var(--pink); color: var(--pink); }
.next-btn {
  flex: 1; padding: 13px;
  background: linear-gradient(135deg,var(--pink),var(--purple));
  color: white; font-size: 14px; font-weight: 700; border: none;
  border-radius: 12px; cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 14px rgba(255,107,157,0.35); letter-spacing: 1px;
}
.next-btn:disabled { background: #e8dde4; box-shadow: none; color: #bba0b0; cursor: not-allowed; }
.next-btn:not(:disabled):active { transform: scale(0.97); }

/* RESULT */
#result { display: none; }
.result-card {
  background: var(--card); border-radius: 28px;
  padding: 40px 28px 36px; box-shadow: var(--shadow);
  text-align: center; animation: fadeInUp 0.6s ease;
}
.result-emoji { font-size: 68px; display: block; margin-bottom: 14px; animation: bounceIn 0.7s ease; }
@keyframes bounceIn {
  0%{transform:scale(0.3);opacity:0} 50%{transform:scale(1.1)}
  70%{transform:scale(0.95)} 100%{transform:scale(1);opacity:1}
}
.result-type-label { font-size: 12px; font-weight: 700; color: var(--pink); letter-spacing: 3px; margin-bottom: 8px; }
.result-title { font-size: 26px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
.result-subtitle { font-size: 14px; color: var(--text-light); font-weight: 600; margin-bottom: 22px; }

.dim-bars { margin-bottom: 22px; display: flex; flex-direction: column; gap: 10px; }
.dim-bar-row { display: flex; align-items: center; gap: 10px; }
.dim-bar-name { font-size: 12px; font-weight: 700; color: var(--text-light); width: 52px; text-align: right; flex-shrink: 0; }
.dim-bar-bg { flex: 1; height: 10px; background: var(--pink-light); border-radius: 99px; overflow: hidden; }
.dim-bar-fill { height: 100%; border-radius: 99px; transition: width 1.2s cubic-bezier(0.25,1,0.5,1); width: 0%; }
.dim-bar-val { font-size: 12px; font-weight: 700; color: var(--text-light); width: 30px; text-align: left; flex-shrink: 0; }

.result-desc {
  background: linear-gradient(135deg,#fff5f9,#f8f0ff);
  border-radius: 16px; padding: 18px;
  font-size: 14px; color: var(--text); line-height: 1.8;
  text-align: left; margin-bottom: 18px; border: 1px solid var(--pink-light);
}
.result-traits { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-bottom: 22px; }
.trait-tag { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; }
.trait-pos { background: var(--pink-light); color: var(--pink-dark); }
.trait-neg { background: var(--purple-light); color: #7b4fa8; }

.compat-section { margin-bottom: 20px; }
.compat-title { font-size: 13px; font-weight: 800; color: var(--text); margin-bottom: 10px; text-align: left; }
.compat-row { display: flex; gap: 8px; flex-wrap: wrap; }
.compat-tag { padding: 6px 14px; border-radius: 12px; font-size: 12px; font-weight: 700; }
.compat-good { background: #e8f8f0; color: #2d8a5e; }
.compat-bad { background: #ffeaea; color: #c0392b; }

.result-divider { height: 1px; background: var(--pink-light); margin: 20px 0; }
.result-advice-title { font-size: 13px; font-weight: 800; color: var(--text); margin-bottom: 10px; text-align: left; }
.result-advice { font-size: 13px; color: var(--text-light); line-height: 1.8; text-align: left; }

.restart-btn {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg,var(--pink),var(--purple));
  color: white; font-size: 15px; font-weight: 700; border: none;
  border-radius: 16px; cursor: pointer; letter-spacing: 2px;
  box-shadow: 0 6px 20px rgba(255,107,157,0.4); margin-top: 22px; transition: all 0.2s;
}
.restart-btn:active { transform: scale(0.97); }

@keyframes fadeInUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideInRight { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
@keyframes slideInLeft { from{opacity:0;transform:translateX(-30px)} to{opacity:1;transform:translateX(0)} }

.confetti-wrap { position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:999; }
.confetti-piece { position:absolute;top:-20px;border-radius:2px;animation:confettiFall linear forwards; }
@keyframes confettiFall { to{transform:translateY(110vh) rotate(720deg);opacity:0} }
</style>
</head>
<body>
<div class="container">
  <div id="cover">
    <span class="cover-emoji">💘</span>
    <div class="cover-title">恋爱脑人格测试</div>
    <div class="cover-sub">40道情景题，从3个维度精准测出你的恋爱人格<br>看看你是哪一种恋爱脑？</div>
    <div class="cover-tags">
      <span class="tag">💬 40道题</span>
      <span class="tag">⏱ 约5分钟</span>
      <span class="tag">🔬 6种人格</span>
      <span class="tag">📊 3维度分析</span>
    </div>
    <div class="cover-dims">
      <div class="cover-dims-title">📐 测量维度</div>
      <div class="dim-row"><span class="dim-dot" style="background:#ff6b9d"></span><strong>依赖度</strong>：你在感情中有多需要对方的陪伴与回应</div>
      <div class="dim-row"><span class="dim-dot" style="background:#c77dff"></span><strong>投入度</strong>：你愿意为感情付出多少精力与自我</div>
      <div class="dim-row"><span class="dim-dot" style="background:#54a0ff"></span><strong>控制欲</strong>：你对感情走向的掌控与不确定性的容忍度</div>
    </div>
    <button class="start-btn" id="start-btn">开始测试 →</button>
    <div class="cover-note">测试结果仅供娱乐参考，请勿对号入座 🌸</div>
  </div>

  <div id="quiz">
    <div class="quiz-header">
      <span class="q-counter"><strong id="cur-num">1</strong>/40</span>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
      <span class="dim-badge" id="dim-badge" style="background:#ffd6e8;color:#e0457a">依赖度</span>
    </div>
    <div class="question-card" id="question-card"></div>
    <div class="nav-row">
      <button class="prev-btn" id="prev-btn">← 上一题</button>
      <button class="next-btn" id="next-btn" disabled>下一题 →</button>
    </div>
  </div>

  <div id="result">
    <div class="result-card" id="result-card"></div>
  </div>
</div>
<div class="confetti-wrap" id="confetti-wrap"></div>
<script>
// 40道题，3个维度：D=依赖度 I=投入度 C=控制欲
// 每题4个选项，分值 0-3，对应该维度的得分
var questions = [
  // ===== 依赖度 D（14题） =====
  { dim:"D", emoji:"📱", text:"你和喜欢的人在聊天，TA突然说要去忙，1小时没回消息。你会……",
    options:[
      {t:"完全不在意，自己该干嘛干嘛",s:0},
      {t:"偶尔瞄一眼手机，但不会主动打扰",s:1},
      {t:"心里有点空，会不停看手机有没有回复",s:2},
      {t:"开始焦虑：是不是我说错了什么？",s:3}]},
  { dim:"D", emoji:"🌙", text:"周末晚上，TA说要陪家人不能见你，你会……",
    options:[
      {t:"挺好的，我也正好安排自己的事",s:0},
      {t:"有点遗憾，但理解",s:1},
      {t:"感觉冷清，希望TA能尽快回来",s:2},
      {t:"觉得失落甚至有点难过，会反复想念TA",s:3}]},
  { dim:"D", emoji:"✈️", text:"TA要出差两周，你的感受是……",
    options:[
      {t:"正好我有时间做自己的事，可以充电",s:0},
      {t:"有点想，但生活节奏不会被打乱",s:1},
      {t:"每天都想TA，需要频繁视频通话",s:2},
      {t:"感觉空落落的，影响到了工作和心情",s:3}]},
  { dim:"D", emoji:"💬", text:"和TA吵架冷战，你通常……",
    options:[
      {t:"该睡睡，该吃吃，等情绪过去再聊",s:0},
      {t:"会反思一下，过几小时主动沟通",s:1},
      {t:"心里很不安，吃不下睡不好，急着和好",s:2},
      {t:"立刻无法忍受，会主动低头求和",s:3}]},
  { dim:"D", emoji:"🎉", text:"闺蜜/兄弟约你出去玩，你刚谈恋爱不久，你会……",
    options:[
      {t:"当然去啊，朋友的约不能爽",s:0},
      {t:"去，但会跟对象提一下",s:1},
      {t:"先问对象有没有安排，再决定",s:2},
      {t:"如果对象不去，我可能也不太想去了",s:3}]},
  { dim:"D", emoji:"🛌", text:"理想中的同居生活是……",
    options:[
      {t:"各有各的空间，独处时间很重要",s:0},
      {t:"大部分时间一起，偶尔分开做自己的事",s:1},
      {t:"几乎所有空闲时间都黏在一起",s:2},
      {t:"恨不得24小时都不分开",s:3}]},
  { dim:"D", emoji:"🤝", text:"做重要决定时（比如换工作），你会……",
    options:[
      {t:"自己想清楚再告诉TA",s:0},
      {t:"和TA商量，但主要还是自己拿主意",s:1},
      {t:"很看重TA的意见，几乎会按TA说的来",s:2},
      {t:"如果TA反对，我可能就不做了",s:3}]},
  { dim:"D", emoji:"🍽️", text:"你独自吃饭、看电影、旅行的感觉是……",
    options:[
      {t:"很享受，独处是一种休息",s:0},
      {t:"还行，偶尔为之挺好",s:1},
      {t:"有点孤单，会想要个伴",s:2},
      {t:"很难受，无法享受一个人的状态",s:3}]},
  { dim:"D", emoji:"💔", text:"上一段感情结束后多久你能完全走出来？",
    options:[
      {t:"几周就调整好了，重新投入新生活",s:0},
      {t:"1-3个月，会难过但能复原",s:1},
      {t:"半年甚至更久，状态长时间低迷",s:2},
      {t:"很久都走不出来，甚至会影响下一段",s:3}]},
  { dim:"D", emoji:"📅", text:"恋爱中，TA和朋友聚会没叫你，你会……",
    options:[
      {t:"没事，TA本来就有自己的圈子",s:0},
      {t:"觉得正常，自己也安排点事",s:1},
      {t:"有点失落，希望TA能多带上我",s:2},
      {t:"会不开心，觉得TA不重视我",s:3}]},
  { dim:"D", emoji:"🌅", text:"如果TA说「我们都需要一些自己的时间」，你会……",
    options:[
      {t:"完全赞同，独立空间很重要",s:0},
      {t:"理解，但希望频率不要太高",s:1},
      {t:"心里有点慌，担心是不是出问题了",s:2},
      {t:"会很难过，怀疑TA是不是不爱了",s:3}]},
  { dim:"D", emoji:"📞", text:"一天没收到TA的消息，你的反应是……",
    options:[
      {t:"完全没注意到，自己事情很多",s:0},
      {t:"想起来会随口问一句「在干嘛」",s:1},
      {t:"心里有些不踏实，会主动找话题",s:2},
      {t:"会非常焦虑，反复猜测原因",s:3}]},
  { dim:"D", emoji:"🪞", text:"没有恋爱的时候，你的生活状态是……",
    options:[
      {t:"很充实，根本不觉得需要一个人",s:0},
      {t:"挺好的，但偶尔也想有人陪",s:1},
      {t:"会有点空虚，希望尽快遇到喜欢的人",s:2},
      {t:"感觉生活缺了一大块，必须有恋爱",s:3}]},
  { dim:"D", emoji:"🌧️", text:"心情不好的时候，你最想……",
    options:[
      {t:"自己消化，听音乐看剧或者睡觉",s:0},
      {t:"找朋友聊聊或者出去走走",s:1},
      {t:"第一个想找对象倾诉",s:2},
      {t:"必须有对象陪着才能缓过来",s:3}]},

  // ===== 投入度 I（13题） =====
  { dim:"I", emoji:"💌", text:"刚开始喜欢一个人时，你会……",
    options:[
      {t:"保持原有节奏，慢慢观察",s:0},
      {t:"稍微主动一些，但不会变化太大",s:1},
      {t:"会调整生活节奏给对方腾出空间",s:2},
      {t:"几乎每天都在想TA，整个状态都改变了",s:3}]},
  { dim:"I", emoji:"🎁", text:"对方过生日，你的准备是……",
    options:[
      {t:"送个实用的礼物，不需要太花哨",s:0},
      {t:"用心挑选一份合适的礼物",s:1},
      {t:"提前一两周准备，包括惊喜环节",s:2},
      {t:"提前一个月策划，恨不得搞成大型仪式",s:3}]},
  { dim:"I", emoji:"⏰", text:"恋爱中你愿意为TA花的时间占你总空闲时间的……",
    options:[
      {t:"不到20%，我有很多自己的事",s:0},
      {t:"30-50%，平衡分配",s:1},
      {t:"60-80%，TA是我生活重心",s:2},
      {t:"几乎全部，除了工作我都想给TA",s:3}]},
  { dim:"I", emoji:"💼", text:"为了和对象多相处，你会推掉重要的工作/学习吗？",
    options:[
      {t:"不会，工作学习是底线",s:0},
      {t:"偶尔会调整，但不影响大事",s:1},
      {t:"经常会调整以TA为优先",s:2},
      {t:"会，TA比这些都重要",s:3}]},
  { dim:"I", emoji:"🪐", text:"你会因为爱一个人改变什么？",
    options:[
      {t:"基本不会改变自己",s:0},
      {t:"会改变一些小习惯",s:1},
      {t:"会改变穿衣风格、爱好、社交圈",s:2},
      {t:"愿意彻底改变，包括三观和生活方式",s:3}]},
  { dim:"I", emoji:"📸", text:"你的社交媒体上跟对象有关的内容占比……",
    options:[
      {t:"几乎没有，我喜欢保持低调",s:0},
      {t:"偶尔发一两条",s:1},
      {t:"经常晒，朋友都知道我谈恋爱了",s:2},
      {t:"几乎全是跟TA有关的，秀恩爱日常",s:3}]},
  { dim:"I", emoji:"😢", text:"对方哭了或难过了，你的反应是……",
    options:[
      {t:"安慰几句，但不会过度卷入",s:0},
      {t:"陪伴和倾听，帮TA分析问题",s:1},
      {t:"会感同身受，心情也跟着低落",s:2},
      {t:"比TA还难受，恨不得替TA承担一切",s:3}]},
  { dim:"I", emoji:"🌹", text:"恋爱关系里你最看重什么？",
    options:[
      {t:"互相独立，各自精彩",s:0},
      {t:"舒适、轻松、不互相消耗",s:1},
      {t:"深度联结，灵魂共鸣",s:2},
      {t:"全身心投入，灵魂和身体都属于彼此",s:3}]},
  { dim:"I", emoji:"💸", text:"你愿意为对方花钱的程度是……",
    options:[
      {t:"AA为主，礼物适度",s:0},

// 维度颜色
var dimColors = {
  "D": {bg:"#ffd6e8", color:"#e0457a", name:"依赖度"},
  "I": {bg:"#e8d5ff", color:"#7b4fa8", name:"投入度"},
  "C": {bg:"#d6e8ff", color:"#2c5da8", name:"控制欲"}
};

var currentQ = 0;
var answers = new Array(questions.length).fill(null);

function startQuiz() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion(0, 'right');
}

function renderQuestion(index, dir) {
  var card = document.getElementById('question-card');
  var q = questions[index];
  var labels = ['A','B','C','D'];
  var optionsHtml = '';
  for (var i = 0; i < q.options.length; i++) {
    var sel = answers[index] === i ? ' selected' : '';
    optionsHtml += '<button class="option-btn' + sel + '" data-idx="' + i + '">' +
      '<div class="option-inner">' +
      '<span class="option-label">' + labels[i] + '</span>' +
      '<span>' + q.options[i].t + '</span>' +
      '</div></button>';
  }
  card.innerHTML =
    '<div class="q-num-badge">Q ' + (index + 1) + ' / ' + questions.length + '</div>' +
    '<div class="q-emoji">' + q.emoji + '</div>' +
    '<div class="q-text">' + q.text + '</div>' +
    '<div class="options" id="options">' + optionsHtml + '</div>';

  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = (dir === 'right') ? 'slideInRight 0.35s ease' : 'slideInLeft 0.35s ease';

  document.getElementById('cur-num').textContent = index + 1;
  document.getElementById('progress-fill').style.width = (index / questions.length * 100) + '%';
  document.getElementById('prev-btn').style.visibility = index === 0 ? 'hidden' : 'visible';

  // 维度徽章
  var dim = dimColors[q.dim];
  var badge = document.getElementById('dim-badge');
  badge.textContent = dim.name;
  badge.style.background = dim.bg;
  badge.style.color = dim.color;

  var nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = index === questions.length - 1 ? '查看结果 ✨' : '下一题 →';
  nextBtn.disabled = answers[index] === null;

  document.getElementById('options').addEventListener('click', function(e) {
    var btn = e.target.closest('.option-btn');
    if (!btn) return;
    var idx = parseInt(btn.getAttribute('data-idx'), 10);
    answers[currentQ] = idx;
    var btns = document.querySelectorAll('.option-btn');
    for (var j = 0; j < btns.length; j++) {
      btns[j].classList.toggle('selected', j === idx);
    }
    document.getElementById('next-btn').disabled = false;
  });
}

function nextQ() {
  if (answers[currentQ] === null) return;
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion(currentQ, 'right');
  } else {
    showResult();
  }
}

function prevQ() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion(currentQ, 'left');
  }
}

function calcScores() {
  var sum = {D:0, I:0, C:0};
  var cnt = {D:0, I:0, C:0};
  for (var i = 0; i < questions.length; i++) {
    if (answers[i] !== null) {
      var dim = questions[i].dim;
      sum[dim] += questions[i].options[answers[i]].s;
      cnt[dim] += 1;
    }
  }
  return {
    D: cnt.D ? Math.round(sum.D / (cnt.D * 3) * 100) : 0,
    I: cnt.I ? Math.round(sum.I / (cnt.I * 3) * 100) : 0,
    C: cnt.C ? Math.round(sum.C / (cnt.C * 3) * 100) : 0
  };
}

function getType(scores) {
  // 阈值 50 作为高低分界
  var d = scores.D >= 50 ? 'H' : 'L';
  var i = scores.I >= 50 ? 'H' : 'L';
  var c = scores.C >= 50 ? 'H' : 'L';
  var key = d + i + c;
  // 如果完全匹配不到（如 LLH），就匹配最接近的
  if (types[key]) return types[key];
  // 兜底映射
  var fallback = {
    "LLH":"HLH",  // 低依赖低投入高控制 → 矛盾纠结型
    "HLL":"HHL"   // 高依赖低投入低控制 → 甜蜜依赖型
  };
  return types[fallback[key] || "LHL"];
}

function showResult() {
  document.getElementById('progress-fill').style.width = '100%';
  var scores = calcScores();
  var type = getType(scores);

  setTimeout(function() {
    document.getElementById('quiz').style.display = 'none';
    document.getElementById('result').style.display = 'block';

    var posTraits = type.traits.slice(0, 4).map(function(t) {
      return '<span class="trait-tag trait-pos">' + t + '</span>';
    }).join('');
    var negTraits = type.traits.slice(4).map(function(t) {
      return '<span class="trait-tag trait-neg">' + t + '</span>';
    }).join('');

    var goodHtml = type.good.map(function(t) {
      return '<span class="compat-tag compat-good">💚 ' + t + '</span>';
    }).join('');
    var badHtml = type.bad.map(function(t) {
      return '<span class="compat-tag compat-bad">⚠️ ' + t + '</span>';
    }).join('');

    document.getElementById('result-card').innerHTML =
      '<span class="result-emoji">' + type.emoji + '</span>' +
      '<div class="result-type-label">类型 · ' + type.code + '</div>' +
      '<div class="result-title">' + type.title + '</div>' +
      '<div class="result-subtitle">' + type.subtitle + '</div>' +
      '<div class="dim-bars">' +
        dimBar('依赖度', scores.D, '#ff6b9d') +
        dimBar('投入度', scores.I, '#c77dff') +
        dimBar('控制欲', scores.C, '#54a0ff') +
      '</div>' +
      '<div class="result-desc">' + type.desc + '</div>' +
      '<div class="result-traits">' + posTraits + negTraits + '</div>' +
      '<div class="result-divider"></div>' +
      '<div class="compat-section">' +
        '<div class="compat-title">💕 兼容人格</div>' +
        '<div class="compat-row">' + goodHtml + '</div>' +
      '</div>' +
      '<div class="compat-section">' +
        '<div class="compat-title">⚡ 慎重组合</div>' +
        '<div class="compat-row">' + badHtml + '</div>' +
      '</div>' +
      '<div class="result-divider"></div>' +
      '<div class="result-advice-title">💡 给你的建议</div>' +
      '<div class="result-advice">' + type.advice + '</div>' +
      '<button class="restart-btn" id="restart-btn">再测一次 🔄</button>';

    setTimeout(function() {
      var fills = document.querySelectorAll('.dim-bar-fill');
      var vals = [scores.D, scores.I, scores.C];
      for (var i = 0; i < fills.length; i++) {
        fills[i].style.width = vals[i] + '%';
      }
    }, 100);

    document.getElementById('restart-btn').addEventListener('click', restart);

    // 高依赖或高投入触发彩带
    if (scores.D >= 65 || scores.I >= 65) throwConfetti();
  }, 300);
}

function dimBar(name, val, color) {
  return '<div class="dim-bar-row">' +
    '<span class="dim-bar-name">' + name + '</span>' +
    '<div class="dim-bar-bg"><div class="dim-bar-fill" style="background:' + color + '"></div></div>' +
    '<span class="dim-bar-val">' + val + '%</span>' +
    '</div>';
}

function restart() {
  currentQ = 0;
  answers = new Array(questions.length).fill(null);
  document.getElementById('result').style.display = 'none';
  document.getElementById('cover').style.display = 'block';
  document.getElementById('confetti-wrap').innerHTML = '';
}

function throwConfetti() {
  var wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  var colors = ['#ff6b9d','#c77dff','#ffd700','#ff9ff3','#54a0ff','#ff6348'];
  for (var i = 0; i < 60; i++) {
    var el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = (Math.random() * 100) + '%';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    el.style.animationDelay = (Math.random() * 0.8) + 's';
    el.style.opacity = (0.7 + Math.random() * 0.3).toString();
    wrap.appendChild(el);
  }
  setTimeout(function() { wrap.innerHTML = ''; }, 4000);
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('start-btn').addEventListener('click', startQuiz);
  document.getElementById('next-btn').addEventListener('click', nextQ);
  document.getElementById('prev-btn').addEventListener('click', prevQ);
});
</script>
